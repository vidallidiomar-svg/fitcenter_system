{% extends "base.html" %}

{% block conteudo %}

<h2>Meus treinos</h2>

<table class="table">

    <tr>
        <th>Treino</th>
        <th>Abrir</th>
        <th>Status</th>
    </tr>

    {% for t in treinos %}

    <tr>

        <td>{{ t["nome"] }}</td>

        <td>
            <a href="/uploads/treinos/{{ t['arquivo_pdf'] }}" target="_blank">
                Abrir treino
            </a>
        </td>

        <td>

            {% if t["concluido"] == 1 %}

            ✔ Concluído

            {% else %}

            <a href="/concluir_treino/{{ t['id'] }}">
                Marcar concluído
            </a>

            {% endif %}

        </td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
