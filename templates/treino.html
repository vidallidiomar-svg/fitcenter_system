{% extends "base.html" %}

{% block conteudo %}

<h2>Treinos do aluno</h2>

<form method="POST">

Nome do treino (A/B/C):<br>
<input name="nome">

<br><br>

<button type="submit">Criar treino</button>

</form>

<hr>

<h3>Treinos cadastrados</h3>

<ul>

{% for t in treinos %}

<li>

Treino {{t[1]}}
<a href="/exercicios/{{t[0]}}">Abrir treino</a>

</li>

{% endfor %}

</ul>

{% endblock %}
