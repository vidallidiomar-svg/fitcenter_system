{% extends "base.html" %}

{% block conteudo %}

<h2>Progresso do aluno</h2>

<h3>{{ aluno["nome"] }}</h3>

<hr>

<table border="1" cellpadding="10">

    <tr>
        <th>Exercício</th>
        <th>Peso utilizado</th>
        <th>Reps realizadas</th>
    </tr>

    {% for p in progresso %}

    <tr>

        <td>{{ p["nome"] }}</td>
        <td>{{ p["peso_real"] }}</td>
        <td>{{ p["reps_real"] }}</td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
