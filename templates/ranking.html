{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Ranking da academia</h2>

<table class="table table-striped">

<thead>

<tr>
<th>Posição</th>
<th>Aluno</th>
<th>XP</th>
</tr>

</thead>

<tbody>

{% for aluno in ranking %}

<tr>

<td>{{ loop.index }}</td>
<td>{{ aluno["nome"] }}</td>
<td>{{ aluno["xp"] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
