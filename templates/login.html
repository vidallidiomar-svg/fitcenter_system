<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <title>FitCenter Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {

            background-image: url("/static/img/background.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            display: flex;
            align-items: center;
            justify-content: center;

            height: 100vh;

        }

        .login-box {

            background: rgba(0, 0, 0, 0.85);

            padding: 40px;

            border-radius: 12px;

            width: 380px;

            text-align: center;

            color: white;

        }

        .login-box img {

            width: 90px;
            margin-bottom: 15px;

        }

        .btn-login {

            background: #00b3b3;
            border: none;

        }

        .btn-login:hover {

            background: #008c8c;

        }
    </style>

</head>

<body>

    <div class="login-box">

        <img src="/static/img/logo.png">

        <h3>FitCenter</h3>

        {% if erro %}
        <div class="alert alert-danger">{{erro}}</div>
        {% endif %}

        <form method="POST">

            <input class="form-control mb-3" name="email" placeholder="Email">

            <input class="form-control mb-3" type="password" name="senha" placeholder="Senha">

            <button class="btn btn-login w-100">Entrar</button>

        </form>

    </div>

</body>

</html>
