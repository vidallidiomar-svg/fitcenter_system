{% extends "base.html" %}

{% block conteudo %}

<h2>Lista de alunos</h2>

<table border="1" cellpadding="10">

<tr>
<th>ID</th>
<th>Nome</th>
<th>Email</th>
<th>Avaliação</th>
</tr>

{% for aluno in alunos %}

<tr>

<td>{{aluno[0]}}</td>
<td>{{aluno[1]}}</td>
<td>{{aluno[2]}}</td>

<td>
<a href="/avaliacao/{{aluno[0]}}">Avaliação física</a>
</td>

</tr>

{% endfor %}

</table>

{% endblock %}
