<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <title>FitCenter</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {

            background-image: url("/static/img/background.png");
            background-size: cover;
            background-position: center;

            color: white;

        }

        /* LAYOUT */

        .wrapper {

            display: flex;

        }

        /* SIDEBAR */

        .sidebar {

            width: 220px;
            height: 100vh;

            background: #000;

            padding-top: 30px;

            position: fixed;

        }

        .sidebar a {

            display: block;

            color: white;

            padding: 15px;

            text-decoration: none;

        }

        .sidebar a:hover {

            background: #00b3b3;

        }

        /* CONTEUDO */

        .content {

            margin-left: 220px;
            padding: 30px;

            width: 100%;

        }

        /* CARDS */

        .card {

            background: rgba(0, 0, 0, 0.8);

            border: none;

            color: white;

        }
    </style>

</head>

<body>

    <div class="wrapper">

        <div class="sidebar">

            <h4 class="text-center text-info">FitCenter</h4>

            <a href="/dashboard">Home</a>

            <a href="/treino">Treino</a>

            <a href="/dieta">Dieta</a>

            <a href="/perfil">Perfil</a>

            <a href="/logout">Sair</a>

        </div>

        <div class="content">

            {% block conteudo %}{% endblock %}

        </div>

    </div>

</body>

</html>
