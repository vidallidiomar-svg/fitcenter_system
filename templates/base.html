<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <title>FITCENTER</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0e0e0e;
            color: white;
            font-family: Arial;
        }

        .navbar {
            background: #000;
            border-bottom: 2px solid #00b3b3;
        }

        .navbar-brand {
            color: #00e6e6 !important;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .nav-link {
            color: white !important;
        }

        .nav-link:hover {
            color: #00e6e6 !important;
        }

        .card {
            background: #111;
            border: 1px solid #222;
            color: white;
        }

        .metric {
            font-size: 40px;
            font-weight: bold;
            color: #00e6e6;
        }
    </style>

</head>

<body>

    <nav class="navbar navbar-expand-lg">

        <div class="container">

            <a class="navbar-brand" href="/">FITCENTER</a>

            <div class="navbar-nav">

                <a class="nav-link" href="/">Dashboard</a>
                <a class="nav-link" href="/treinador">Treinador</a>
                <a class="nav-link" href="/nutri">Nutrição</a>
                <a class="nav-link" href="/ranking">Ranking</a>
                <a class="nav-link" href="/portal_aluno">Portal aluno</a>

            </div>

        </div>

    </nav>

    <div class="container mt-4">

        {% block conteudo %}{% endblock %}

    </div>

</body>

</html>
