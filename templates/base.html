<!DOCTYPE html>
<html>

<head>

<title>FITCENTER</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

nav{
background:#111;
padding:15px;
}

nav a{
color:white;
margin-right:20px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#00ff9c;
}

.container{
padding:30px;
}

table{
border-collapse:collapse;
background:white;
}

th{
background:#111;
color:white;
}

th,td{
padding:10px 15px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#111;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#00ff9c;
color:black;
}

input,select{
padding:6px;
margin-bottom:10px;
}

img{
border-radius:8px;
}

</style>

</head>

<body>

<nav>

<a href="/">Dashboard</a>

<a href="/cadastro">Cadastrar aluno</a>

<a href="/alunos">Alunos</a>

<a href="/ranking">Ranking</a>

<a href="/login_aluno">Portal do aluno</a>

</nav>

<div class="container">

{% endblock %}

</div>

</body>

</html>
