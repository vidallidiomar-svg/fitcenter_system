<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>FITCENTER</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

background: #000 url("/static/icon.png") no-repeat center;
background-size: 500px;
background-attachment: fixed;
color:white;

}

/* camada escura sobre fundo */

body::before{

content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
z-index:-1;

}

/* navbar */

.navbar{

background:#000;
border-bottom:2px solid #00b3b3;

}

.navbar-brand{

color:#00b3b3 !important;
font-weight:bold;
letter-spacing:2px;

}

.nav-link{

color:white !important;

}

.nav-link:hover{

color:#00b3b3 !important;

}

/* cards */

.card{

background:#111;
border:1px solid #222;
border-radius:10px;
color:white;
box-shadow:0px 5px 20px rgba(0,0,0,0.5);

}

/* números grandes */

.metric{

font-size:40px;
font-weight:bold;
color:#00b3b3;

}

/* tabela ranking */

.table{

background:#111;
color:white;

}

.table th{

background:#00b3b3;
color:black;

}

/* botões */

.btn-primary{

background:#00b3b3;
border:none;

}

.btn-primary:hover{

background:#008888;

}

.container{

margin-top:40px;

}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand" href="/">
FITCENTER
</a>

<div class="navbar-nav">

<a class="nav-link" href="/">Dashboard</a>
<a class="nav-link" href="/cadastro">Cadastrar aluno</a>
<a class="nav-link" href="/alunos">Alunos</a>
<a class="nav-link" href="/ranking">Ranking</a>
<a class="nav-link" href="/login">Portal do aluno</a>

</div>

</div>

</nav>

<div class="container">

{% block content %}{% endblock %}

</div>

</body>

</html>
