{% extends "base.html" %}

{% block conteudo %}

<h2>Painel do Treinador</h2>

<hr>

<h3>Enviar treino para aluno</h3>

<form method="POST" action="/upload_treino" enctype="multipart/form-data">

    <div class="mb-2">
        <input class="form-control" name="aluno_id" placeholder="ID do aluno" required>
    </div>

    <div class="mb-2">
        <input class="form-control" name="nome" placeholder="Nome do treino (ex: Treino A)" required>
    </div>

    <div class="mb-3">
        <input class="form-control" type="file" name="arquivo" required>
    </div>

    <button class="btn btn-primary">
        Enviar treino
    </button>

</form>

<hr>

<h4>Ranking da academia</h4>

<table class="table table-dark">

    <tr>
        <th>Posição</th>
        <th>Aluno</th>
        <th>XP</th>
    </tr>

    {% for aluno in ranking %}

    <tr>
        <td>{{loop.index}}</td>
        <td>{{aluno["nome"]}}</td>
        <td>{{aluno["xp"]}}</td>
    </tr>

    {% endfor %}

</table>

{% endblock %}
