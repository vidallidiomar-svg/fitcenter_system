{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Construtor de Treino</h2>

<div class="card p-4 mb-4">

<h4>Criar novo treino</h4>

<form method="POST" action="/criar_treino">

<label>Aluno</label>

<select name="aluno_id" class="form-control mb-3" required>

<option value="">Selecione o aluno</option>

{% for aluno in alunos %}

<option value="{{ aluno[0] }}">
{{ aluno[1] }}
</option>

{% endfor %}

</select>

<label>Nome do treino</label>

<input class="form-control mb-3" name="nome" placeholder="Ex: Treino A">

<button class="btn btn-primary">
Criar treino
</button>

</form>

</div>



<div class="card p-4">

<h4>Adicionar exercício ao treino</h4>

<form method="POST" action="/adicionar_exercicio">

<div class="row">

<div class="col-md-2">

<label>ID do treino</label>
<input class="form-control" name="treino_id">

</div>

<div class="col-md-2">

<label>Ordem</label>
<input class="form-control" name="ordem">

</div>

<div class="col-md-3">

<label>Exercício</label>
<input class="form-control" name="nome" placeholder="Ex: Supino reto">

</div>

<div class="col-md-1">

<label>Séries</label>
<input class="form-control" name="series">

</div>

<div class="col-md-2">

<label>Repetições</label>
<input class="form-control" name="repeticoes">

</div>

<div class="col-md-1">

<label>Peso</label>
<input class="form-control" name="peso">

</div>

<div class="col-md-1">

<label>Intervalo</label>
<input class="form-control" name="intervalo">

</div>

</div>

<div class="row mt-3">

<div class="col-md-3">

<label>Método</label>
<input class="form-control" name="metodo" placeholder="Drop / Biset / Fmax">

</div>

<div class="col-md-3">

<label>Movimento</label>
<input class="form-control" name="movimento" placeholder="Lento / Rápido">

</div>

</div>

<button class="btn btn-primary mt-3">
Adicionar exercício
</button>

</form>

</div>

{% endblock %}
