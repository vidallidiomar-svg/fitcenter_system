{% extends "base.html" %}

{% block conteudo %}

<h2>Avaliação física</h2>

<h3>Nova avaliação</h3>

<form method="POST">

Peso:<br>
<input name="peso">

<br><br>

Gordura corporal:<br>
<input name="gordura">

<br><br>

Massa muscular:<br>
<input name="massa">

<br><br>

Data:<br>
<input type="date" name="data">

<br><br>

<button type="submit">Salvar avaliação</button>

</form>

<hr>

<h3>Histórico de avaliações</h3>

<table border="1" cellpadding="10">

<tr>
<th>Data</th>
<th>Peso</th>
<th>Gordura</th>
<th>Massa</th>
</tr>

{% for a in avaliacoes %}

<tr>

<td>{{a[3]}}</td>
<td>{{a[0]}}</td>
<td>{{a[1]}}</td>
<td>{{a[2]}}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
