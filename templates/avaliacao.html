{% extends "base.html" %}

{% block conteudo %}

<div class="container">

    <h2 class="mb-4">Avaliação Física</h2>

    <div class="card p-4 mb-4">

        <h4>Nova avaliação</h4>

        <form method="POST">

            <div class="row">

                <div class="col-md-3">

                    <label>Peso</label>
                    <input class="form-control" name="peso">

                </div>

                <div class="col-md-3">

                    <label>Gordura corporal</label>
                    <input class="form-control" name="gordura">

                </div>

                <div class="col-md-3">

                    <label>Massa muscular</label>
                    <input class="form-control" name="massa">

                </div>

                <div class="col-md-3">

                    <label>Data</label>
                    <input type="date" class="form-control" name="data">

                </div>

            </div>

            <br>

            <button class="btn btn-primary">
                Salvar avaliação
            </button>

        </form>

    </div>


    <div class="card p-4">

        <h4>Histórico de avaliações</h4>

        <table class="table table-dark">

            <tr>
                <th>Data</th>
                <th>Peso</th>
                <th>Gordura</th>
                <th>Massa</th>
            </tr>

            {% for a in avaliacoes %}

            <tr>

                <td>{{a[3]}}</td>
                <td>{{a[0]}}</td>
                <td>{{a[1]}}</td>
                <td>{{a[2]}}</td>

            </tr>

            {% endfor %}

        </table>

    </div>

</div>

{% endblock %}
