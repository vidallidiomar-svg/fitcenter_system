{% extends "base.html" %}

{% block conteudo %}

<h2 class="mb-4">Painel Administrativo</h2>

<div class="card p-4 mb-4">

    <h4>Criar novo usuário</h4>

    <form method="POST" action="/criar_usuario">

        <div class="row">

            <div class="col-md-3">
                <input class="form-control" name="nome" placeholder="Nome">
            </div>

            <div class="col-md-3">
                <input class="form-control" name="email" placeholder="Email">
            </div>

            <div class="col-md-2">
                <input class="form-control" name="senha" placeholder="Senha">
            </div>

            <div class="col-md-2">

                <select class="form-control" name="perfil">

                    <option value="aluno">Aluno</option>
                    <option value="treinador">Treinador</option>
                    <option value="nutricionista">Nutricionista</option>
                    <option value="admin">Admin</option>

                </select>

            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100">Criar</button>
            </div>

        </div>

    </form>

</div>

<h4>Usuários do sistema</h4>

<table class="table table-dark">

    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Email</th>
        <th>Perfil</th>
        <th>Ações</th>
    </tr>

    {% for u in usuarios %}

    <tr>

        <td>{{u["id"]}}</td>
        <td>{{u["nome"]}}</td>
        <td>{{u["email"]}}</td>
        <td>{{u["perfil"]}}</td>

        <td>

            <a href="/excluir_usuario/{{u['id']}}" class="btn btn-danger btn-sm">
                Excluir
            </a>

        </td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
