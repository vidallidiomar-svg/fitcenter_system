{% extends "base.html" %}

{% block conteudo %}

<h1>Dashboard FITCENTER</h1>

<hr>

<h3>Total de alunos</h3>
<p>{{ total_alunos }}</p>

<h3>XP da academia</h3>
<p>{{ total_xp }}</p>

<hr>

<h2>Ranking</h2>

<table border="1" cellpadding="10">

<tr>
<th>Aluno</th>
<th>XP</th>
</tr>

{% for aluno in ranking %}

<tr>
<td>{{ aluno["nome"] }}</td>
<td>{{ aluno["xp"] }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
