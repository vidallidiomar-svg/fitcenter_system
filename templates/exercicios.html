{% extends "base.html" %}

{% block conteudo %}

<h2 class="mb-4">Biblioteca de Exercícios</h2>

<div class="row">

    <!-- FORMULÁRIO -->
    <div class="col-md-4">

        <div class="card p-4">

            <h4 class="mb-3">Novo exercício</h4>

            <form method="POST" action="/criar_exercicio">

                <div class="mb-3">

                    <label>Nome</label>
                    <input class="form-control" name="nome" placeholder="Ex: Supino reto">

                </div>

                <div class="mb-3">

                    <label>Grupo muscular</label>

                    <select class="form-control" name="grupo">

                        <option>Peito</option>
                        <option>Costas</option>
                        <option>Perna</option>
                        <option>Ombro</option>
                        <option>Bíceps</option>
                        <option>Tríceps</option>
                        <option>Abdômen</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label>Equipamento</label>
                    <input class="form-control" name="equipamento" placeholder="Ex: Barra">

                </div>

                <button class="btn btn-primary w-100">
                    Criar exercício
                </button>

            </form>

        </div>

    </div>

    <!-- LISTA -->
    <div class="col-md-8">

        <div class="card p-4">

            <h4 class="mb-3">Lista de exercícios</h4>

            <table class="table table-dark table-striped">

                <thead>

                    <tr>
                        <th>Nome</th>
                        <th>Grupo</th>
                        <th>Equipamento</th>
                    </tr>

                </thead>

                <tbody>

                    {% for e in exercicios %}

                    <tr>

                        <td>{{e["nome"]}}</td>
                        <td>{{e["grupo"]}}</td>
                        <td>{{e["equipamento"]}}</td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
